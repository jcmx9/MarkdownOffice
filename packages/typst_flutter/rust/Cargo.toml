[package]
name = "typst_flutter"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "staticlib"]

[dependencies]
anyhow = "1.0.102"
flutter_rust_bridge = "=2.11.1"
rustc-hash = "2.1.1"
serde_json = "1.0.149"
typst-as-lib = { version = "0.15.4" }
typst-library = "0.14.2"
typst-pdf = "0.14.2"
typst-syntax = "0.14.2"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(frb_expand)'] }
